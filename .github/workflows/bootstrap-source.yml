name: Bootstrap ProjectMaterialBuilder Source

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Expand source archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zipPath = $null
          $extractPath = '.bootstrap/extract'

          if (Test-Path 'pmb-source-min.zip') {
            $zipPath = 'pmb-source-min.zip'
            Write-Host 'Using root pmb-source-min.zip.'
          } elseif (Test-Path '.bootstrap/source.zip') {
            $zipPath = '.bootstrap/source.zip'
            Write-Host 'Using .bootstrap/source.zip.'
          } elseif (Test-Path '.bootstrap') {
            $parts = Get-ChildItem '.bootstrap' -Filter 'source.zip.b64.part*' | Sort-Object Name
            if ($parts.Count -eq 0) {
              throw 'No source archive found. Upload pmb-source-min.zip to repository root, or provide .bootstrap/source.zip.b64.part* chunks.'
            }

            $base64Path = '.bootstrap/source.zip.b64'
            $zipPath = '.bootstrap/source.zip'
            if (Test-Path $base64Path) { Remove-Item $base64Path -Force }
            foreach ($part in $parts) {
              Add-Content -LiteralPath $base64Path -Value (Get-Content -LiteralPath $part.FullName -Raw) -NoNewline
            }

            $bytes = [Convert]::FromBase64String((Get-Content -LiteralPath $base64Path -Raw))
            [System.IO.File]::WriteAllBytes((Resolve-Path '.bootstrap').Path + '\source.zip', $bytes)
            Write-Host "Using chunked bootstrap archive with $($parts.Count) part(s)."
          } else {
            throw 'No source archive found. Upload pmb-source-min.zip to repository root and run this workflow again.'
          }

          if (Test-Path $extractPath) { Remove-Item $extractPath -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force

          Copy-Item -Path (Join-Path $extractPath '*') -Destination '.' -Recurse -Force
          if (Test-Path '.bootstrap') { Remove-Item '.bootstrap' -Recurse -Force }
          if (Test-Path 'pmb-source-min.zip') { Remove-Item 'pmb-source-min.zip' -Force }
          Remove-Item '.github/workflows/bootstrap-source.yml' -Force

      - name: Commit expanded source
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          $changes = git status --porcelain
          if (-not $changes) {
            Write-Host 'No changes to commit.'
            exit 0
          }
          git commit -m 'Bootstrap ProjectMaterialBuilder source'
          git push
